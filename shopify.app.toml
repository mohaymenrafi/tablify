# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "a892bc1f820b804587981712a058f5c2"
application_url = "https://example.com"
embedded = true
name = "Tablify"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,read_content,write_metaobjects"

[app_proxy]
url = "https://example.com/proxy"
subpath = "tablify"
prefix = "apps"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

[auth]
redirect_urls = [ "https://example.com/api/auth" ]

[build]
automatically_update_urls_on_dev = true

# App-owned metaobject definition that backs the "Table" picker in the theme
# editor. Each Tablify table is mirrored to an entry of this type so merchants
# can select a table from a native list instead of pasting an ID.
[metaobjects.app.tablify_table]
name = "Tablify table"
description = "A table created in the Tablify app."
access.admin = "merchant_read_write"
access.storefront = "public_read"

  [metaobjects.app.tablify_table.fields.name]
  name = "Name"
  type = "single_line_text_field"

  [metaobjects.app.tablify_table.fields.table_id]
  name = "Table ID"
  type = "single_line_text_field"
